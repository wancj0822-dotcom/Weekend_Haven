<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太空留言站</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

/* 背景：这里改成GitHub上传的本地图片！ */
body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
  // ======================================
  // 只需要把 bg.jpg 改成你上传的图片名字
  // ======================================
  background-image: url('https://raw.githubusercontent.com/wangcj0822-dotcom/Weekend_Haven/main/bg.jpg'); 
  background-size: cover;
  background-position: center;
  color: #fff;
}

/* 留言漂浮粒子样式 */
.particle {
  position: absolute;
  padding: 6px 12px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50px;
  backdrop-filter: blur(10px);
  white-space: nowrap;
  pointer-events: none;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

/* 底部主按钮：领取门禁卡 */
.main-btn {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 36px;
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 100px;
  font-size: 16px;
  cursor: pointer;
  z-index: 999;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}
.main-btn:hover {
  background: rgba(255, 255, 255, 0.25);
}

/* 弹窗面板 */
.panel {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.85);
  z-index: 1000;
  padding: 20px;
}
.card {
  background: rgba(20, 20, 30, 0.9);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  padding: 30px;
  max-width: 400px;
  margin: 60px auto;
  text-align: center;
  backdrop-filter: blur(20px);
}
#qrcode {
  margin: 20px auto;
  width: 180px;
  height: 180px;
  background: #fff;
  padding: 10px;
  border-radius: 10px;
}
input, textarea, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
}
button {
  background: rgba(255,255,255,0.2);
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}
button:hover {
  background: rgba(255,255,255,0.3);
}
</style>
</head>

<body>
<!-- 主按钮：领取门禁卡 -->
<button class="main-btn" onclick="generateCard()">领取门禁卡</button>

<!-- 门禁卡弹窗 -->
<div class="panel" id="cardModal">
  <div class="card">
    <h2>你的专属门禁卡</h2>
    <div id="qrcode"></div>
    <p id="cardCode"></p>
    <br>
    <button onclick="openMessagePanel()">进入留言&抽奖</button>
    <button onclick="closeAllModal()">关闭</button>
  </div>
</div>

<!-- 留言&抽奖弹窗 -->
<div class="panel" id="msgPanel">
  <div class="card">
    <h2>留言 & 抽奖</h2>
    <textarea id="userMsg" placeholder="写下你想说的话"></textarea>
    <button onclick="submitMessage()">提交留言（审核后显示）</button>
    <br><br>

    <input id="lotteryCodeInput" placeholder="输入抽奖码">
    <button onclick="startLottery()">立即抽奖</button>
    <p id="lotteryResult"></p>
    <br>
    <button onclick="getMyLotteryCode()">领取抽奖码</button>
    <button onclick="closeAllModal()">返回主页</button>
  </div>
</div>

<script>
// ======================
// 只修改下面2行你的Supabase信息！
// ======================
const SUPABASE_URL = "https://arxbijpfazirchlvjjgw.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyeGJpanBmYXppcmNobHZqamd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDgyNzgsImV4cCI6MjA5NDI4NDI3OH0.-4jdMitiNuvFGNlXcsxqnzaHZ0oF3xR_nyBk52rnZ2M";

// 只创建1次客户端，修复重复声明报错
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let myCardId = "";

// 页面加载：自动加载已审核留言，生成漂浮粒子
window.onload = loadApprovedMessages;

// 生成门禁卡+二维码
async function generateCard() {
  try {
    myCardId = Math.random().toString(36).substring(2, 12);
    document.getElementById("cardModal").style.display = "block";
    document.getElementById("cardCode").innerText = "门禁码：" + myCardId;
    
    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), {
      text: myCardId,
      width: 180,
      height: 180,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
    
    await sbClient.from("access_cards").insert([{qr_code: myCardId}]);
  } catch (error) {
    alert("错误：" + error.message);
  }
}

// 打开留言面板
function openMessagePanel() {
  document.getElementById("cardModal").style.display = "none";
  document.getElementById("msgPanel").style.display = "block";
}

// 关闭所有弹窗
function closeAllModal() {
  document.getElementById("cardModal").style.display = "none";
  document.getElementById("msgPanel").style.display = "none";
  loadApprovedMessages(); // 关闭时刷新漂浮留言
}

// 提交留言
async function submitMessage() {
  const content = document.getElementById("userMsg").value.trim();
  if (!content) return alert("请输入留言内容");
  await sbClient.from("messages").insert([{
    content: content,
    type: "text",
    is_approved: false
  }]);
  alert("提交成功！管理员审核后将显示在主页");
  document.getElementById("userMsg").value = "";
}

// 领取抽奖码
async function getMyLotteryCode() {
  try {
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    const { error } = await sbClient.from("lottery_codes").insert([{code: code, is_used: false}]);
    if (error) throw error;
    alert("✅ 抽奖码领取成功！\n你的抽奖码是：" + code);
  } catch (error) {
    alert("❌ 领取失败：" + error.message);
  }
}

// 抽奖
async function startLottery() {
  const code = document.getElementById("lotteryCodeInput").value.trim();
  if (!code) return alert("请先领取抽奖码");
  try {
    const { data, error } = await sbClient.from("lottery_codes")
      .select("*").eq("code", code).limit(1);
    if (error) throw error;
    if (data.length === 0) return alert("❌ 无效抽奖码");
    if (data[0].is_used) return alert("❌ 已使用的抽奖码");
    
    const prizes = ["奖品A", "奖品B", "奖品C", "奖品D", "奖品E", "奖品F"];
    const result = prizes[Math.floor(Math.random() * prizes.length)];
    await sbClient.from("lottery_codes")
      .update({is_used: true, prize: result})
      .eq("code", code);
    document.getElementById("lotteryResult").innerText = "🎉 恭喜获得：" + result;
  } catch (error) {
    alert("❌ 抽奖失败：" + error.message);
  }
}

// 加载已审核留言 → 生成随机漂浮粒子（核心功能）
async function loadApprovedMessages() {
  // 清空旧粒子
  document.querySelectorAll('.particle').forEach(p => p.remove());
  
  const { data } = await sbClient.from("messages")
    .select("content").eq("is_approved", true);
    
  if (data) data.forEach(msg => createFloatParticle(msg.content));
}

// 创建无规则漂浮粒子
function createFloatParticle(text) {
  const div = document.createElement("div");
  div.className = "particle";
  div.innerText = text;
  document.body.appendChild(div);
  
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;
  let vx = (Math.random() - 0.5) * 0.8;
  let vy = (Math.random() - 0.5) * 0.8;
  
  div.style.left = x + "px";
  div.style.top = y + "px";
  
  function animate() {
    x += vx; y += vy;
    if (x < 0 || x > window.innerWidth) vx = -vx;
    if (y < 0 || y > window.innerHeight) vy = -vy;
    div.style.left = x + "px";
    div.style.top = y + "px";
    requestAnimationFrame(animate);
  }
  animate();
}
</script>
</body>
</html>
