<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>周末收留所</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --base-font: 16px;
  --card-max-width: 350px;
  --panel-max-width: 420px;
}
@media (min-width: 768px) {
  :root {
    --base-font: 18px;
  }
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "幼圆", "YouYuan", system-ui, sans-serif;
  font-size: var(--base-font);
}

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), url('bg.jpg') center/cover no-repeat;
  color: #fff;
}

.particle {
  position: absolute;
  padding: 6px 12px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50px;
  backdrop-filter: blur(10px);
  white-space: nowrap;
  pointer-events: none;
  font-size: 0.9rem;
  color: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.2);
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.entry-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 90vw;
  max-width: var(--panel-max-width);
  z-index: 10;
}

.entry-panel h1 {
  font-size: 2.2rem;
  margin-bottom: 20px;
  text-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
  letter-spacing: 2px;
}

.entry-panel p {
  font-size: 1rem;
  margin-bottom: 30px;
  opacity: 0.8;
}

.entry-panel input {
  width: 100%;
  padding: 16px;
  margin-bottom: 20px;
  border-radius: 50px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  font-size: 1rem;
  text-align: center;
  backdrop-filter: blur(10px);
  outline: none;
}

.main-btn {
  width: 100%;
  padding: 16px 36px;
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 50px;
  font-size: 1rem;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: 0.3s;
  font-weight: bold;
  letter-spacing: 1px;
}

.main-btn:hover {
  background: rgba(255, 255, 255, 0.25);
  transform: scale(1.02);
}

.panel {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.85);
  z-index: 1000;
  padding: 20px;
}

.card-container {
  max-width: var(--card-max-width);
  margin: 10vh auto;
  text-align: center;
}

.card {
  width: 100%;
  height: 220px;
  border-radius: 20px;
  padding: 20px;
  margin: 0 auto 30px;
  position: relative;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  transition: background 0.5s ease;
}

.card-nickname {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 1.3rem;
  font-weight: bold;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
}

.card-qrcode {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100px;
  height: 100px;
  background: #fff;
  padding: 5px;
  border-radius: 8px;
}

.card-code {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-size: 0.9rem;
  opacity: 0.9;
  text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
}

.card-buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  margin: 0 auto;
}

.card-btn {
  padding: 14px;
  border-radius: 50px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card-btn:hover {
  background: rgba(255, 255, 255, 0.25);
}

.card-btn.secondary {
  background: rgba(255, 255, 255, 0.08);
}

.msg-card {
  background: rgba(20, 20, 30, 0.9);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  padding: 30px 20px;
  max-width: var(--panel-max-width);
  margin: 10vh auto;
  text-align: center;
  backdrop-filter: blur(20px);
}

.msg-card h2 {
  font-size: 1.5rem;
  margin-bottom: 20px;
}

.msg-card textarea {
  height: 120px;
  resize: none;
}

.msg-card input, .msg-card textarea, .msg-card button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border-radius: 12px;
  border: none;
  font-size: 1rem;
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
  outline: none;
}

.msg-card button {
  background: rgba(255,255,255,0.2);
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.msg-card button:hover {
  background: rgba(255,255,255,0.3);
}

.wall-card {
  background: rgba(20, 20, 30, 0.95);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  padding: 30px 20px;
  max-width: var(--panel-max-width);
  max-height: 80vh;
  margin: 10vh auto;
  backdrop-filter: blur(20px);
  overflow-y: auto;
}

.wall-card h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 1.5rem;
}

.message-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 20px;
}

.message-item {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  border-left: 3px solid rgba(255,255,255,0.3);
}

.message-nickname {
  font-weight: bold;
  font-size: 1.1rem;
  margin-bottom: 5px;
}

.message-content {
  font-size: 1rem;
  opacity: 0.9;
  margin-bottom: 8px;
  line-height: 1.5;
}

.message-time {
  font-size: 0.8rem;
  opacity: 0.6;
  text-align: right;
}

.close-btn {
  width: 100%;
  padding: 14px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.close-btn:hover {
  background: rgba(255,255,255,0.25);
}

#lotteryResult {
  margin-top: 10px;
  font-size: 1.1rem;
  font-weight: bold;
  color: #ffd700;
}
</style>
</head>
<body>
<div class="entry-panel">
  <h1>周末收留所</h1>
  <p>输入你的昵称，领取专属门禁卡</p>
  <input type="text" id="nicknameInput" placeholder="请输入你的昵称" maxlength="10">
  <button class="main-btn" onclick="generateCard()">领取门禁卡</button>
</div>

<div class="panel" id="cardModal">
  <div class="card-container">
    <div class="card" id="accessCard">
      <div class="card-nickname" id="cardNickname"></div>
      <div class="card-qrcode" id="qrcode"></div>
      <div class="card-code" id="cardCode"></div>
    </div>
    <div class="card-buttons">
      <button class="card-btn" onclick="shareCard()">分享给朋友</button>
      <button class="card-btn" onclick="regenerateCard()">重新领取</button>
      <button class="card-btn secondary" onclick="openMessagePanel()">进入留言&抽奖</button>
    </div>
  </div>
</div>

<div class="panel" id="msgPanel">
  <div class="msg-card">
    <h2>留言 & 抽奖</h2>
    <textarea id="userMsg" placeholder="写下你想说的话"></textarea>
    <button onclick="submitMessage()">提交留言（审核后显示）</button>
    <br><br>
    <input id="lotteryCodeInput" placeholder="输入抽奖码">
    <button onclick="startLottery()">立即抽奖</button>
    <p id="lotteryResult"></p>
    <br>
    <button onclick="getMyLotteryCode()">领取抽奖码</button>
    <button onclick="openMessageWall()">住户留言墙</button>
    <button onclick="closeAllModal()">返回主页</button>
  </div>
</div>

<div class="panel" id="messageWallPanel">
  <div class="wall-card">
    <h2>住户留言墙</h2>
    <div class="message-list" id="messageList"></div>
    <button class="close-btn" onclick="closeMessageWall()">返回</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://arxbijpfazirchlvjjgw.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyeGJpanBmYXppcmNobHZqamd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDgyNzgsImV4cCI6MjA5NDI4NDI3OH0.-4jdMitiNuvFGNlXcsxqnzaHZ0oF3xR_nyBk52rnZ2M";
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentNickname = "";
let currentCardId = "";
window.allMessages = [];

const gradients = [
  "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
  "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)",
  "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)",
  "linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)",
  "linear-gradient(135deg, #fa709a 0%, #fee140 100%)",
  "linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)",
  "linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)",
  "linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)"
];

window.onload = loadApprovedMessages;

function getRandomGradient() {
  return gradients[Math.floor(Math.random() * gradients.length)];
}

async function generateCard() {
  const nickname = document.getElementById("nicknameInput").value.trim();
  if (!nickname) {
    alert("请输入你的昵称");
    return;
  }
  
  currentNickname = nickname;
  currentCardId = Math.random().toString(36).substring(2, 12);
  
  document.querySelector(".entry-panel").style.display = "none";
  document.getElementById("cardModal").style.display = "block";
  document.getElementById("cardNickname").innerText = nickname;
  document.getElementById("cardCode").innerText = "编号：" + currentCardId;
  document.getElementById("accessCard").style.background = getRandomGradient();
  
  document.getElementById("qrcode").innerHTML = "";
  new QRCode(document.getElementById("qrcode"), {
    text: currentCardId, width: 100, height: 100
  });
  
  try {
    await sbClient.from("access_cards").insert([{ qr_code: currentCardId, nickname: nickname }]);
  } catch(e) { console.log(e); }
}

function regenerateCard() {
  document.getElementById("accessCard").style.background = getRandomGradient();
}

async function shareCard() {
  const card = document.getElementById("accessCard");
  try {
    const canvas = await html2canvas(card, { backgroundColor: null, scale: 2 });
    const link = document.createElement("a");
    link.download = `门禁卡-${currentNickname}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
    alert("卡片已保存到相册！");
  } catch(e) { alert("分享失败"); }
}

function openMessagePanel() {
  document.getElementById("cardModal").style.display = "none";
  document.getElementById("msgPanel").style.display = "block";
}

function openMessageWall() {
  document.getElementById("msgPanel").style.display = "none";
  document.getElementById("messageWallPanel").style.display = "block";
  
  const list = document.getElementById("messageList");
  list.innerHTML = "";
  
  if (window.allMessages.length > 0) {
    window.allMessages.forEach(m => {
      const time = new Date(m.created_at).toLocaleString("zh-CN");
      const name = m.nickname || "匿名";
      item.innerHTML = `
        <div class="message-nickname">${name}</div>
        <div class="message-content">${m.content}</div>
        <div class="message-time">${time}</div>
      `;
      list.appendChild(item);
    });
  } else {
    list.innerHTML = "<p style='text-align:center;opacity:0.6;'>暂无留言</p>";
  }
}

function closeMessageWall() {
  document.getElementById("messageWallPanel").style.display = "none";
  document.getElementById("msgPanel").style.display = "block";
}

function closeAllModal() {
  document.getElementById("cardModal").style.display = "none";
  document.getElementById("msgPanel").style.display = "none";
  document.getElementById("messageWallPanel").style.display = "none";
  document.querySelector(".entry-panel").style.display = "block";
  loadApprovedMessages();
}

async function submitMessage() {
  const content = document.getElementById("userMsg").value.trim();
  if (!content) return alert("请输入内容");
  
  try {
    await sbClient.from("messages").insert([{
      content: content, nickname: currentNickname, is_approved: false
    }]);
    alert("提交成功！");
    document.getElementById("userMsg").value = "";
  } catch(e) { alert("提交失败"); }
}

async function getMyLotteryCode() {
  try {
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    await sbClient.from("lottery_codes").insert([{ code, is_used: false, nickname: currentNickname }]);
    alert("抽奖码：" + code);
  } catch(e) { alert("领取失败"); }
}

async function startLottery() {
  const code = document.getElementById("lotteryCodeInput").value.trim();
  if (!code) return alert("请输入抽奖码");
  
  const { data } = await sbClient.from("lottery_codes").select("*").eq("code", code);
  if (!data?.length) return alert("无效码");
  if (data[0].is_used) return alert("已使用");
  
  const prizes = ["一等奖","二等奖","三等奖","四等奖","五等奖","谢谢参与"];
  const prize = prizes[Math.floor(Math.random() * prizes.length)];
  await sbClient.from("lottery_codes").update({ is_used: true, prize }).eq("code", code);
  document.getElementById("lotteryResult").innerText = "恭喜：" + prize;
}

async function loadApprovedMessages() {
  document.querySelectorAll(".particle").forEach(p => p.remove());
  const { data } = await sbClient.from("messages").select("*").eq("is_approved", true);
  if (data) {
    window.allMessages = data;
    data.forEach(m => {
      const name = m.nickname || "匿名";
      createFloatParticle(`${name}：${m.content}`);
    });
  }
}

function createFloatParticle(text) {
  const div = document.createElement("div");
  div.className = "particle";
  div.innerText = text;
  document.body.appendChild(div);
  
  let x = Math.random() * (innerWidth - div.offsetWidth);
  let y = Math.random() * (innerHeight - div.offsetHeight);
  let vx = (Math.random() - 0.5) * 0.8;
  let vy = (Math.random() - 0.5) * 0.8;
  
  function animate() {
    x += vx; y += vy;
    if (x < 0 || x > innerWidth - div.offsetWidth) vx = -vx;
    if (y < 0 || y > innerHeight - div.offsetHeight) vy = -vy;
    div.style.left = x + "px";
    div.style.top = y + "px";
    requestAnimationFrame(animate);
  }
  animate();
}
</script>
</body>
</html>
