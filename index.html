<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太空留言站</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

/* 太空极简背景 —— 这里换背景图！*/
body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
  background-image: url('https://picsum.photos/id/1039/1920/1080');
  background-size: cover;
  background-position: center;
  color: #fff;
}

/* 留言粒子样式：极简太空风 */
.particle {
  position: absolute;
  padding: 6px 12px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50px;
  backdrop-filter: blur(10px);
  white-space: nowrap;
  pointer-events: none;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.2);
  animation: float 8s infinite linear;
}

/* 按钮：极简悬浮按钮 */
.btn {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 36px;
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 100px;
  font-size: 16px;
  cursor: pointer;
  z-index: 999;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}
.btn:hover {
  background: rgba(255, 255, 255, 0.25);
}

/* 弹窗面板 */
.panel {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.85);
  z-index: 1000;
  padding: 20px;
}
.card {
  background: rgba(20, 20, 30, 0.9);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  padding: 30px;
  max-width: 400px;
  margin: 60px auto;
  text-align: center;
  backdrop-filter: blur(20px);
}
#qrcode {
  margin: 20px auto;
  width: 180px;
  height: 180px;
  background: #fff;
  padding: 10px;
  border-radius: 10px;
}
input, textarea, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
}
button {
  background: rgba(255,255,255,0.2);
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}
button:hover {
  background: rgba(255,255,255,0.3);
}
</style>
</head>

<body>
<button class="btn" onclick="openPanel()">进入留言</button>

<div class="panel" id="msgPanel">
  <div class="card">
    <h2>💬 留言</h2>
    <textarea id="content" placeholder="写下你的留言..."></textarea>
    <button onclick="sendMsg()">提交（需审核）</button>
    <br>
    <button onclick="closePanel()">关闭</button>
  </div>
</div>

<script>
// ======================
// 只改这两行！
// ======================
const SUPABASE_URL = "https://arxbijpfazirchlvjjgw.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyeGJpanBmYXppcmNobHZqamd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDgyNzgsImV4cCI6MjA5NDI4NDI3OH0.-4jdMitiNuvFGNlXcsxqnzaHZ0oF3xR_nyBk52rnZ2M";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 页面加载 → 自动显示所有已审核留言
window.onload = async function () {
  loadAllApprovedMessages();
};

// 加载所有通过审核的留言 → 生成漂浮粒子
async function loadAllApprovedMessages() {
  // 清空旧粒子
  document.querySelectorAll(".particle").forEach(p => p.remove());

  const { data } = await supabase
    .from("messages")
    .select("content")
    .eq("is_approved", true);

  if (!data) return;
  
  data.forEach(row => {
    createFloatText(row.content);
  });
}

// 创建随机漂浮粒子（核心）
function createFloatText(text) {
  const p = document.createElement("div");
  p.className = "particle";
  p.innerText = text;
  document.body.appendChild(p);

  // 随机位置
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;

  // 随机速度
  let vx = (Math.random() - 0.5) * 1.2;
  let vy = (Math.random() - 0.5) * 1.2;

  p.style.left = x + "px";
  p.style.top = y + "px";

  function animate() {
    x += vx;
    y += vy;

    // 碰到边界反弹
    if (x < 0 || x > window.innerWidth) vx = -vx;
    if (y < 0 || y > window.innerHeight) vy = -vy;

    p.style.left = x + "px";
    p.style.top = y + "px";
    requestAnimationFrame(animate);
  }
  animate();
}

// 提交留言
async function sendMsg() {
  const content = document.getElementById("content").value.trim();
  if (!content) return alert("请输入内容");

  await supabase.from("messages").insert([{
    content: content,
    is_approved: false
  }]);

  alert("提交成功！管理员审核后会显示");
  document.getElementById("content").value = "";
}

function openPanel() {
  document.getElementById("msgPanel").style.display = "block";
}
function closePanel() {
  document.getElementById("msgPanel").style.display = "none";
  loadAllApprovedMessages(); // 关闭时刷新粒子
}
</script>
</body>
</html>
