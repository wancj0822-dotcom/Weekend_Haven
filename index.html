<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>周末收留所</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --base-font: 16px;
  --card-max-width: 350px;
  --panel-max-width: 420px;
}
@media (min-width: 768px) {
  :root {
    --base-font: 18px;
  }
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "幼圆", "YouYuan", system-ui, sans-serif;
  font-size: var(--base-font);
}

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), url('bg.jpg') center/cover no-repeat;
  color: #fff;
}

/* 漂浮留言 */
.particle {
  position: absolute;
  padding: 6px 12px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50px;
  backdrop-filter: blur(10px);
  white-space: nowrap;
  pointer-events: none;
  font-size: 0.9rem;
  color: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.2);
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 入口面板 */
.entry-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 90vw;
  max-width: var(--panel-max-width);
  z-index: 10;
}
.entry-panel h1 {
  font-size: 2.2rem;
  margin-bottom: 20px;
  text-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
  letter-spacing: 2px;
}
.entry-panel p {
  font-size: 1rem;
  margin-bottom: 30px;
  opacity: 0.8;
}
.entry-panel input {
  width: 100%;
  padding: 16px;
  margin-bottom: 20px;
  border-radius: 50px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  font-size: 1rem;
  text-align: center;
  backdrop-filter: blur(10px);
  outline: none;
}
.main-btn {
  width: 100%;
  padding: 16px 36px;
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 50px;
  font-size: 1rem;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: 0.3s;
  font-weight: bold;
}
.main-btn:hover {
  background: rgba(255, 255, 255, 0.25);
  transform: scale(1.02);
}

/* 通用弹窗 */
.panel {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.85);
  z-index: 1000;
  padding: 20px;
}

/* 卡片容器 */
.card-container {
  max-width: var(--card-max-width);
  margin: 10vh auto;
  text-align: center;
}

/* 高级美化门禁卡（核心优化） */
.card {
  width: 100%;
  height: 240px;
  border-radius: 24px;
  padding: 30px 25px;
  margin: 0 auto 30px;
  position: relative;
  box-shadow: 
    0 25px 60px rgba(0, 0, 0, 0.6), 
    inset 0 0 30px rgba(255,255,255,0.12),
    0 0 0 1px rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.25);
  transition: background 0.5s ease;
  overflow: hidden;
}
/* 卡片流光特效 */
.card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.08), transparent);
  animation: shine 6s infinite linear;
}
@keyframes shine {
  0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
  100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
}
/* 昵称：左上角左对齐 */
.card-nickname {
  position: absolute;
  top: 30px;
  left: 25px;
  font-size: 1.1rem;
  font-weight: bold;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
  z-index: 2;
  text-align: left;
}
/* 副标题：左上角左对齐，昵称下方 */
.card-subtitle {
  position: absolute;
  top: 60px;
  left: 25px;
  font-size: 0.75rem;
  opacity: 0.9;
  text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
  z-index: 2;
  letter-spacing: 1px;
  text-align: left;
}
.card-code {
  position: absolute;
  bottom: 25px;
  right: 25px;
  font-size: 0.85rem;
  opacity: 0.9;
  text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
  z-index: 2;
}

/* 卡片按钮 */
.card-buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  margin: 0 auto;
}
.card-btn {
  padding: 14px;
  border-radius: 50px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: 0.3s;
  z-index: 2;
}
.card-btn.back-home {
  background: rgba(255,255,255,0.08);
}
.card-btn:hover {
  background: rgba(255, 255, 255, 0.25);
}

/* 新增：语音收集模块 */
.voice-section {
  margin-top: 20px;
  padding: 15px;
  border-radius: 16px;
  background: rgba(20,20,30,0.8);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
}
.voice-title {
  font-size: 1rem;
  font-weight: bold;
  margin-bottom: 8px;
  color: #ffd700;
}
.voice-tip {
  font-size: 0.75rem;
  opacity: 0.8;
  margin-bottom: 12px;
  line-height: 1.4;
}
.voice-record-btn {
  width: 100%;
  padding: 16px;
  border-radius: 50px;
  border: 1px solid rgba(255,204,0,0.5);
  background: rgba(255,204,0,0.15);
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.2s;
}
.voice-record-btn:active {
  background: rgba(255,204,0,0.3);
  transform: scale(0.98);
}

/* 分享二维码弹窗 */
.share-modal {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(20,20,30,0.95);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  z-index: 2000;
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
}
.share-modal h3 {
  font-size: 1.2rem;
  margin-bottom: 20px;
}
#shareQrcode {
  width: 180px;
  height: 180px;
  margin: 0 auto 20px;
  background: #fff;
  padding: 10px;
  border-radius: 12px;
}
.close-share {
  padding: 10px 20px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.15);
  color: #fff;
  cursor: pointer;
}

/* 住户留言墙 */
.message-wall {
  max-width: var(--panel-max-width);
  margin: 5vh auto;
  height: 80vh;
  display: flex;
  flex-direction: column;
  gap: 15px;
}
.message-list {
  flex: 1;
  background: rgba(20,20,30,0.9);
  border-radius: 16px;
  padding: 20px;
  overflow-y: auto;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
}
.message-item {
  background: rgba(255,255,255,0.05);
  padding: 12px 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  border-left: 3px solid rgba(255,255,255,0.3);
}
.message-nickname {
  font-weight: bold;
  font-size: 1rem;
  margin-bottom: 4px;
}
.message-content {
  font-size: 0.95rem;
  opacity: 0.9;
  line-height: 1.4;
}
.message-time {
  font-size: 0.75rem;
  opacity: 0.6;
  text-align: right;
  margin-top: 6px;
}
.message-input-area {
  background: rgba(20,20,30,0.9);
  padding: 20px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
}
.message-input-area textarea {
  width: 100%;
  height: 100px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color: #fff;
  resize: none;
  margin-bottom: 12px;
  outline: none;
}
.message-input-area button {
  width: 100%;
  padding: 12px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.15);
  color: #fff;
  cursor: pointer;
  transition: 0.3s;
}
.message-input-area button:hover {
  background: rgba(255,255,255,0.25);
}
.back-btn {
  padding: 12px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: #fff;
  cursor: pointer;
}

/* 滚动条美化 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
</style>
</head>
<body>

<!-- 入口界面 -->
<div class="entry-panel">
  <h1>周末收留所</h1>
  <p>输入你的昵称，领取专属门禁卡</p>
  <input type="text" id="nicknameInput" placeholder="请输入你的昵称" maxlength="10">
  <button class="main-btn" onclick="generateCard()">领取门禁卡</button>
</div>

<!-- 门禁卡弹窗 + 新增语音模块 -->
<div class="panel" id="cardModal">
  <div class="card-container">
    <div class="card" id="accessCard">
      <div class="card-nickname" id="cardNickname"></div>
      <div class="card-subtitle">住户·限定开放日</div>
      <div class="card-code" id="cardCode"></div>
    </div>

    <div class="card-buttons">
      <button class="card-btn back-home" onclick="backToHome()">返回主页</button>
      <button class="card-btn" onclick="openShareModal()">分享给朋友</button>
      <button class="card-btn" onclick="regenerateCard()">重新领取</button>
      <button class="card-btn" onclick="openMessageWall()">住户留言墙</button>
    </div>

    <!-- 新增：声音收集模块 -->
    <div class="voice-section">
      <div class="voice-title">声音收集·一句话</div>
      <div class="voice-tip">说出你想对主播/企划说的话，或喊出你爱的主播名字</div>
      <button 
        class="voice-record-btn" 
        id="recordBtn"
        onmousedown="startRecording()" 
        onmouseup="stopRecording()"
        ontouchstart="startRecording()"
        ontouchend="stopRecording()"
      >
        开始录音
      </button>
    </div>
  </div>
</div>

<!-- 分享弹窗 -->
<div class="share-modal" id="shareModal">
  <h3>扫码进入收留所</h3>
  <div id="shareQrcode"></div>
  <button class="close-share" onclick="closeShareModal()">关闭</button>
</div>

<!-- 留言墙 -->
<div class="panel" id="messageWallPanel">
  <div class="message-wall">
    <button class="back-btn" onclick="closeMessageWall()">返回卡片</button>
    <div class="message-list" id="messageList"></div>
    <div class="message-input-area">
      <textarea id="userMsg" placeholder="写下你想说的话..."></textarea>
      <button onclick="submitMessage()">提交留言（审核后展示）</button>
    </div>
  </div>
</div>

<script>
// Supabase 配置
const SUPABASE_URL = "https://arxbijpfazirchlvjjgw.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyeGJpanBmYXppcmNobHZqamd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDgyNzgsImV4cCI6MjA5NDI4NDI3OH0.-4jdMitiNuvFGNlXcsxqnzaHZ0oF3xR_nyBk52rnZ2M";
const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 全局变量
let currentNickname = "";
let currentCardId = "";
let fixedGradientIndex = 0;
window.allMessages = [];
const WEBSITE_URL = window.location.href;

// 录音全局变量
let mediaRecorder = null;
let audioChunks = [];

// 渐变配色
const gradients = [
  "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
  "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)",
  "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)",
  "linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)",
  "linear-gradient(135deg, #fa709a 0%, #fee140 100%)",
  "linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)",
  "linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)",
  "linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)"
];

window.onload = loadApprovedMessages;

// 固定渐变
function getFixedGradientByNickname(nickname) {
  let hash = 0;
  for (let i = 0; i < nickname.length; i++) {
    hash = nickname.charCodeAt(i) + ((hash << 5) - hash);
  }
  fixedGradientIndex = Math.abs(hash) % gradients.length;
  return gradients[fixedGradientIndex];
}

// 重新领取
function regenerateCard() {
  fixedGradientIndex = Math.floor(Math.random() * gradients.length);
  document.getElementById("accessCard").style.background = gradients[fixedGradientIndex];
}

// 生成门禁卡
async function generateCard() {
  const nickname = document.getElementById("nicknameInput").value.trim();
  if (!nickname) {
    alert("请输入你的昵称");
    return;
  }
  currentNickname = nickname;
  currentCardId = Math.random().toString(36).substring(2, 12);

  document.querySelector(".entry-panel").style.display = "none";
  document.getElementById("cardModal").style.display = "block";
  
  document.getElementById("cardNickname").innerText = nickname;
  document.getElementById("cardCode").innerText = "编号：" + currentCardId;
  document.getElementById("accessCard").style.background = getFixedGradientByNickname(nickname);

  try {
    await sbClient.from("access_cards").insert([{ qr_code: currentCardId, nickname: nickname }]);
  } catch (e) { console.log(e); }
}

// 返回主页
function backToHome() {
  document.getElementById("cardModal").style.display = "none";
  document.querySelector(".entry-panel").style.display = "block";
}

// 分享弹窗
function openShareModal() {
  document.getElementById("shareModal").style.display = "block";
  document.getElementById("shareQrcode").innerHTML = "";
  new QRCode(document.getElementById("shareQrcode"), { text: WEBSITE_URL, width: 160, height: 160 });
}
function closeShareModal() {
  document.getElementById("shareModal").style.display = "none";
}

// 留言墙
function openMessageWall() {
  document.getElementById("cardModal").style.display = "none";
  document.getElementById("messageWallPanel").style.display = "block";
  renderMessageList();
}
function closeMessageWall() {
  document.getElementById("messageWallPanel").style.display = "none";
  document.getElementById("cardModal").style.display = "block";
}

// 渲染留言
function renderMessageList() {
  const list = document.getElementById("messageList");
  list.innerHTML = window.allMessages.length === 0 
    ? "<p style='text-align:center;opacity:0.6;'>暂无留言，快来抢沙发吧</p>"
    : window.allMessages.map(m => `
      <div class="message-item">
        <div class="message-nickname">${m.nickname || '匿名'}</div>
        <div class="message-content">${m.content}</div>
        <div class="message-time">${new Date(m.created_at).toLocaleString('zh-CN')}</div>
      </div>
    `).join('');
}

// 提交文字留言
async function submitMessage() {
  const content = document.getElementById("userMsg").value.trim();
  if (!content) return alert("请输入留言内容");
  try {
    await sbClient.from("messages").insert([{ content, nickname: currentNickname, is_approved: false }]);
    alert("✅ 留言提交成功，审核后展示");
    document.getElementById("userMsg").value = "";
  } catch (e) { alert("❌ 提交失败"); }
}

// 加载漂浮留言
async function loadApprovedMessages() {
  document.querySelectorAll(".particle").forEach(p => p.remove());
  const { data } = await sbClient.from("messages").select("*").eq("is_approved", true);
  if (data) {
    window.allMessages = data;
    data.forEach(m => createFloatParticle(`${m.nickname || '匿名'}：${m.content}`));
  }
}

// 漂浮动画
function createFloatParticle(text) {
  const div = document.createElement("div");
  div.className = "particle";
  div.innerText = text;
  document.body.appendChild(div);
  let x = Math.random() * (innerWidth - div.offsetWidth);
  let y = Math.random() * (innerHeight - div.offsetHeight);
  let vx = (Math.random() - 0.5) * 0.8;
  let vy = (Math.random() - 0.5) * 0.8;
  function animate() {
    x += vx; y += vy;
    if (x < 0 || x > innerWidth - div.offsetWidth) vx = -vx;
    if (y < 0 || y > innerHeight - div.offsetHeight) vy = -vy;
    div.style.left = x + "px";
    div.style.top = y + "px";
    requestAnimationFrame(animate);
  }
  animate();
}

// ===================== 新增：语音录音核心代码 =====================
// 开始录音（按住）
async function startRecording() {
  if (!currentNickname) return alert("请先领取门禁卡");
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
    mediaRecorder.start();
    document.getElementById("recordBtn").innerText = "正在录音...松开结束";
  } catch (e) {
    alert("❌ 录音失败，请允许麦克风权限");
    console.error(e);
  }
}

// 停止录音（松开）+ 上传后台
async function stopRecording() {
  if (!mediaRecorder || mediaRecorder.state === "inactive") return;
  mediaRecorder.stop();
  document.getElementById("recordBtn").innerText = "开始录音";

  mediaRecorder.onstop = async () => {
    const audioBlob = new Blob(audioChunks, { type: "audio/mpeg" });
    // 转为Base64上传后台
    const reader = new FileReader();
    reader.readAsDataURL(audioBlob);
    reader.onloadend = async () => {
      const base64Audio = reader.result;
      try {
        // 上传至 voice_messages 表，仅后台可见
        await sbClient.from("voice_messages").insert([{
          nickname: currentNickname,
          audio_base64: base64Audio,
          created_at: new Date()
        }]);
        alert("✅ 语音留言提交成功！仅管理员可收听");
      } catch (e) {
        alert("❌ 语音上传失败");
        console.error(e);
      }
    };
  };
}
</script>
</body>
</html>
