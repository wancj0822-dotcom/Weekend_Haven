<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太空留言站</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif}
body{
width:100vw;height:100vh;overflow:hidden;background:#000;
background-image:url('bg.jpg');
background-size:cover;background-position:center;color:#fff;
}
.particle{
position:absolute;padding:8px 14px;background:rgba(255,255,255,0.12);
border-radius:30px;backdrop-filter:blur(6px);
white-space:nowrap;pointer-events:none;font-size:14px;
border:1px solid rgba(255,255,255,0.2);
}
.btn{
position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
padding:16px 40px;background:#fff;color:#000;border:none;
border-radius:100px;font-size:18px;cursor:pointer;z-index:999;
box-shadow:0 0 20px rgba(255,255,255,0.3)
}
.panel{
display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;
background:rgba(0,0,0,0.85);z-index:1000;padding:20px;
}
.card{
background:#111;border:1px solid #444;border-radius:20px;padding:30px;
max-width:400px;margin:60px auto;text-align:center;
}
#qrcode{margin:20px auto;width:200px;height:200px}
input,textarea,button{
width:100%;padding:14px;margin:8px 0;border-radius:12px;border:none;
font-size:16px;
}
button{background:#fff;color:#000;font-weight:bold}
</style>
</head>

<body>
<button class="btn" onclick="showCard()">领取门禁卡</button>

<div class="panel" id="cardPanel">
<div class="card">
<h2>你的门禁卡</h2>
<div id="qrcode"></div>
<p id="cardText"></p>
<br>
<button onclick="enterSite()">进入留言站</button>
<button onclick="closePanel()">关闭</button>
</div>
</div>

<div class="panel" id="mainPanel">
<div class="card">
<h2>留言 & 抽奖</h2>
<textarea id="msgContent" placeholder="输入文字留言"></textarea>
<button onclick="sendMessage()">提交留言（需审核）</button>
<br><br>

<input id="lotteryInput" placeholder="输入抽奖码">
<button onclick="doLottery()">立即抽奖</button>
<p id="lotteryResult"></p>
<br>
<button onclick="getLotteryCode()">分享后领取抽奖码</button>
<button onclick="closeAll()">返回主页</button>
</div>
</div>

<script>
// 只改下面这两行！
const supabaseUrl = "https://arxbijpfazirchlvjjgw.supabase.co/rest/v1/";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyeGJpanBmYXppcmNobHZqamd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDgyNzgsImV4cCI6MjA5NDI4NDI3OH0.-4jdMitiNuvFGNlXcsxqnzaHZ0oF3xR_nyBk52rnZ2M";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
let currentCard = "";

async function showCard() {
  try {
    const cardId = Math.random().toString(36).substr(2,10);
    currentCard = cardId;
    document.getElementById("cardPanel").style.display = "block";
    document.getElementById("cardText").innerText = "门禁码：" + cardId;
    await QRCode.toCanvas(document.getElementById("qrcode"), cardId, {width:200});
    await supabase.from("access_cards").insert([{qr_code:cardId}]);
  } catch(e) {
    alert("错误：" + e.message);
  }
}

function enterSite() {
document.getElementById("cardPanel").style.display = "none";
document.getElementById("mainPanel").style.display = "block";
}

async function sendMessage() {
const content = document.getElementById("msgContent").value.trim();
if(!content)return alert("请输入内容");
await supabase.from("messages").insert([{content:content,type:"text",is_approved:false}]);
alert("提交成功！管理员审核后将显示在主页");
document.getElementById("msgContent").value = "";
}

async function getLotteryCode() {
const code = Math.floor(100000 + Math.random()*900000).toString();
await supabase.from("lottery_codes").insert([{code:code,is_used:false}]);
alert("你的抽奖码：" + code);
}

async function doLottery() {
const code = document.getElementById("lotteryInput").value.trim();
if(!code)return alert("请输入抽奖码");
const {data} = await supabase.from("lottery_codes").select("*").eq("code",code).single();
if(!data || data.is_used)return alert("无效或已使用");
const prizes = ["奖品A","奖品B","奖品C","奖品D","奖品E","奖品F"];
const result = prizes[Math.floor(Math.random()*prizes.length)];
await supabase.from("lottery_codes").update({is_used:true,prize:result}).eq("code",code);
document.getElementById("lotteryResult").innerText="🎉 恭喜："+result;
}

async function loadParticles() {
const {data} = await supabase.from("messages").select("*").eq("is_approved",true);
if(!data)return;
data.forEach(m => createParticle(m.content));
}

function createParticle(text) {
const div = document.createElement("div");
div.className = "particle";
div.innerText = text;
document.body.appendChild(div);
let x = Math.random() * window.innerWidth;
let y = Math.random() * window.innerHeight;
let vx = (Math.random()-0.5)*0.9;
let vy = (Math.random()-0.5)*0.9;
div.style.left = x + "px";
div.style.top = y + "px";
function move() {
x += vx; y += vy;
if(x<0||x>window.innerWidth||y<0||y>window.innerHeight) {
x = Math.random()*window.innerWidth;
y = Math.random()*window.innerHeight;
}
div.style.left = x+"px";
div.style.top = y+"px";
requestAnimationFrame(move);
}
move();
}

function closePanel() {document.getElementById("cardPanel").style.display="none"}
function closeAll() {document.getElementById("mainPanel").style.display="none"}

window.onload = loadParticles;
</script>
</body>
</html>
